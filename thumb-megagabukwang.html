<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { box-sizing:border-box; }
  body { margin:0; width:1500px; height:600px; font-family: -apple-system, "Malgun Gothic", sans-serif; background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); position:relative; overflow:hidden; }
  .title { position:absolute; top:28px; left:0; width:100%; text-align:center; }
  .title .main { font-size:34px; font-weight:900; color:#fff; letter-spacing:-0.5px; }
  .title .sub { font-size:17px; font-weight:600; color:#94a3b8; margin-top:4px; }
  .grid { position:absolute; top:110px; left:40px; width:1420px; height:470px; display:grid; grid-template-columns:repeat(3,1fr); grid-template-rows:repeat(2,1fr); gap:14px; }
  .cell { background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.10); border-radius:20px; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:10px; position:relative; }
  .halo { width:150px; height:150px; border-radius:50%; display:flex; align-items:center; justify-content:center; margin-bottom:6px; }
  .halo img { width:128px; height:128px; object-fit:contain; filter: drop-shadow(0 4px 10px rgba(0,0,0,0.4)); }
  .name { font-size:22px; font-weight:800; color:#fff; }
  .types { display:flex; gap:6px; margin-top:6px; }
  .type { padding:3px 12px; border-radius:20px; font-size:12px; font-weight:700; color:#fff; }
</style>
</head>
<body>

<div class="title">
  <div class="main">메가거북왕 사이클 파티</div>
  <div class="sub">포켓몬 챔피언스 M-3 시즌 최종 68위</div>
</div>

<div class="grid">
  <div class="cell">
    <div class="halo" style="background:radial-gradient(circle,#6890F055,transparent 70%)"><img src="https://pokesol.app/api/images/assets/pokemons/0009_01.png"></div>
    <div class="name">메가거북왕</div>
    <div class="types"><span class="type" style="background:#6890F0">물</span></div>
  </div>
  <div class="cell">
    <div class="halo" style="background:radial-gradient(circle,#E0C06855,transparent 70%)"><img src="https://pokesol.app/api/images/assets/pokemons/0450.png"></div>
    <div class="name">하마돈</div>
    <div class="types"><span class="type" style="background:#E0C068">땅</span></div>
  </div>
  <div class="cell">
    <div class="halo" style="background:radial-gradient(circle,#7038F855,transparent 70%)"><img src="https://pokesol.app/api/images/assets/pokemons/0706_01.png"></div>
    <div class="name">미끄래곤</div>
    <div class="types"><span class="type" style="background:#B8B8D0">강철</span><span class="type" style="background:#7038F8">드래곤</span></div>
  </div>
  <div class="cell">
    <div class="halo" style="background:radial-gradient(circle,#78C85055,transparent 70%)"><img src="https://pokesol.app/api/images/assets/pokemons/0154_01.png"></div>
    <div class="name">메가메가니움</div>
    <div class="types"><span class="type" style="background:#78C850">풀</span><span class="type" style="background:#EE99AC">페어리</span></div>
  </div>
  <div class="cell">
    <div class="halo" style="background:radial-gradient(circle,#A040A055,transparent 70%)"><img src="https://pokesol.app/api/images/assets/pokemons/0748.png"></div>
    <div class="name">더시마사리</div>
    <div class="types"><span class="type" style="background:#A040A0">독</span><span class="type" style="background:#6890F0">물</span></div>
  </div>
  <div class="cell">
    <div class="halo" style="background:radial-gradient(circle,#70589855,transparent 70%)"><img src="https://pokesol.app/api/images/assets/pokemons/1000.png"></div>
    <div class="name">타부자고</div>
    <div class="types"><span class="type" style="background:#705898">고스트</span><span class="type" style="background:#B8B8D0">강철</span></div>
  </div>
</div>

</body>
</html>
