<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1200px; height:630px; overflow:hidden; font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif; }
  .stage {
    position:relative;
    width:1200px; height:630px;
    background:
      radial-gradient(circle at 85% 15%, rgba(251,146,60,0.28) 0%, rgba(251,146,60,0) 45%),
      linear-gradient(135deg, #180d06 0%, #26150a 45%, #301a0d 100%);
    overflow:hidden;
  }
  .emblem {
    position:absolute; right:-100px; top:-100px;
    width:520px; height:520px; border-radius:50%;
    border:2px solid rgba(251,146,60,0.20);
  }
  .emblem::before {
    content:""; position:absolute; inset:60px; border-radius:50%;
    border:2px solid rgba(251,146,60,0.16);
  }
  .emblem::after {
    content:""; position:absolute; inset:120px; border-radius:50%;
    border:2px solid rgba(251,146,60,0.12);
  }
  .content {
    position:relative; z-index:2;
    padding:80px 90px;
    display:flex; flex-direction:column; justify-content:center;
    height:100%;
  }
  .tag {
    display:inline-block; align-self:flex-start;
    padding:8px 22px; margin-bottom:28px;
    background:rgba(251,146,60,0.15);
    border:1px solid rgba(251,146,60,0.55);
    border-radius:999px;
    color:#fdba74; font-size:22px; font-weight:700; letter-spacing:2px;
  }
  .title-en {
    font-size:52px; font-weight:800; color:#f1f5f9; letter-spacing:0.5px;
    line-height:1.2;
  }
  .title-en .hl { color:#fb923c; }
  .title-kr {
    margin-top:22px;
    font-size:38px; font-weight:700; color:#e2e8f0;
    line-height:1.4;
  }
  .title-kr b { color:#fb923c; }
  .sub {
    margin-top:30px;
    font-size:24px; color:#c0a38a; font-weight:500;
  }
  .brand {
    position:absolute; left:90px; bottom:44px;
    font-size:22px; font-weight:700; color:#7a5f46; letter-spacing:1px;
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="emblem"></div>
    <div class="content">
      <span class="tag">GAME UPDATE</span>
      <div class="title-en">DNF MOBILE <span class="hl">2.0</span></div>
      <div class="title-kr">넥슨 '던파모바일', <b>대규모 개편</b> 예고</div>
      <div class="sub">최고 레벨 90 확장·신규 캐릭터, 8월 13일 적용</div>
    </div>
    <div class="brand">티오의 게임노트</div>
  </div>
</body>
</html>
