<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1200px; height:630px; overflow:hidden; font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif; }
  .stage {
    position:relative;
    width:1200px; height:630px;
    background:
      radial-gradient(circle at 88% 10%, rgba(217,70,239,0.22) 0%, rgba(217,70,239,0) 42%),
      radial-gradient(circle at 100% 60%, rgba(250,204,21,0.14) 0%, rgba(250,204,21,0) 46%),
      radial-gradient(circle at 85% 100%, rgba(139,92,246,0.24) 0%, rgba(139,92,246,0) 44%),
      linear-gradient(135deg, #0a0713 0%, #120a1c 45%, #0d0817 100%);
    overflow:hidden;
  }
  .cards {
    position:absolute; right:-40px; top:60px;
    width:460px; height:460px;
  }
  .card {
    position:absolute;
    width:150px; height:210px;
    border-radius:14px;
    background:linear-gradient(160deg, rgba(139,92,246,0.16), rgba(217,70,239,0.10));
    border:2px solid rgba(250,204,21,0.35);
  }
  .card::before {
    content:""; position:absolute; inset:14px;
    border:1px solid rgba(250,204,21,0.22); border-radius:8px;
  }
  .card.c1 { transform:rotate(-14deg); top:40px; left:120px; opacity:0.55; }
  .card.c2 { transform:rotate(6deg); top:10px; left:230px; opacity:0.8; }
  .card.c3 { transform:rotate(24deg); top:60px; left:320px; opacity:0.4; }
  .content {
    position:relative; z-index:2;
    padding:76px 90px;
    display:flex; flex-direction:column; justify-content:center;
    height:100%;
  }
  .tag {
    display:inline-block; align-self:flex-start;
    padding:8px 22px; margin-bottom:26px;
    background:rgba(250,204,21,0.14);
    border:1px solid rgba(250,204,21,0.55);
    border-radius:999px;
    color:#facc15; font-size:22px; font-weight:700; letter-spacing:2px;
  }
  .title-en {
    font-size:40px; font-weight:800; color:#f1f5f9; letter-spacing:0.5px;
    line-height:1.2;
  }
  .title-en .hl { color:#d946ef; }
  .title-kr {
    margin-top:22px;
    font-size:34px; font-weight:700; color:#e2e8f0;
    line-height:1.45;
  }
  .title-kr b { color:#d946ef; }
  .sub {
    margin-top:28px;
    font-size:23px; color:#8a8496; font-weight:500;
  }
  .brand {
    position:absolute; left:90px; bottom:44px;
    font-size:22px; font-weight:700; color:#3f3a4a; letter-spacing:1px;
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="cards">
      <div class="card c1"></div>
      <div class="card c2"></div>
      <div class="card c3"></div>
    </div>
    <div class="content">
      <span class="tag">베타 패치 v0.109.0 · 7월 16일</span>
      <div class="title-en">SLAY THE SPIRE <span class="hl">2</span></div>
      <div class="title-kr">신규 니오우 유물 2종 · <b>전 클래스</b> 밸런스 조정</div>
      <div class="sub">에이돌론 리워크 · 웰레이드 플랜스 멀티플레이어 지원</div>
    </div>
    <div class="brand">티오의 게임노트</div>
  </div>
</body>
</html>
