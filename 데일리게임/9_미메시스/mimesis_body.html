<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1000px; height:560px; overflow:hidden; font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif; }
  .stage {
    position:relative;
    width:1000px; height:560px;
    background:
      radial-gradient(circle at 12% 88%, rgba(239,68,68,0.26) 0%, rgba(239,68,68,0) 42%),
      linear-gradient(160deg, #150607 0%, #230a0c 55%, #2b0c0f 100%);
    padding:56px 64px;
  }
  .eyebrow {
    color:#fca5a5; font-size:19px; font-weight:700; letter-spacing:2px;
  }
  .headline {
    margin-top:14px;
    color:#f1f5f9; font-size:34px; font-weight:800; line-height:1.35;
  }
  .headline b { color:#ef4444; }
  .grid {
    margin-top:40px;
    display:flex; gap:22px;
  }
  .card {
    flex:1;
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(239,68,68,0.25);
    border-radius:14px;
    padding:26px 22px;
  }
  .card .mark {
    width:34px; height:34px; border-radius:8px;
    background:rgba(239,68,68,0.18);
    border:1px solid rgba(239,68,68,0.5);
    margin-bottom:16px;
    position:relative;
  }
  .card .mark::after {
    content:""; position:absolute; inset:9px;
    background:#ef4444; border-radius:2px;
  }
  .card h3 { color:#f0f4f8; font-size:20px; font-weight:700; margin-bottom:8px; }
  .card .num { color:#ef4444; font-size:22px; font-weight:800; margin-bottom:6px; }
  .card p { color:#a88c8c; font-size:15px; line-height:1.55; }
  .footer {
    margin-top:36px;
    color:#704a4a; font-size:16px; font-weight:600; letter-spacing:1px;
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="eyebrow">MIMESIS 200만장 돌파</div>
    <div class="headline">AI가 동료를 흉내 내는 공포, <b>200만장</b> 흥행 신화</div>
    <div class="grid">
      <div class="card">
        <div class="mark"></div>
        <div class="num">100만 → 200만장</div>
        <h3>업데이트 후 재점화</h3>
        <p>얼리액세스 50일 만에 100만장<br>대규모 업데이트로 200만장 돌파</p>
      </div>
      <div class="card">
        <div class="mark"></div>
        <div class="num">누적 시청 1,034만 시간</div>
        <h3>스팀 '매우 긍정적'</h3>
        <p>최대 동시 시청자 합계 380만명<br>스트리밍 콘텐츠로 큰 화제</p>
      </div>
      <div class="card">
        <div class="mark"></div>
        <div class="num">CEDEC 어워드 우수상</div>
        <h3>한국 게임 최초 수상</h3>
        <p>게임 디자인 부문 우수상<br>최우수상 후보에도 이름</p>
      </div>
    </div>
    <div class="footer">티오의 게임노트</div>
  </div>
</body>
</html>
