<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1000px; height:560px; overflow:hidden; font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif; }
  .stage {
    position:relative;
    width:1000px; height:560px;
    background:
      radial-gradient(circle at 12% 88%, rgba(52,211,153,0.26) 0%, rgba(52,211,153,0) 42%),
      linear-gradient(160deg, #051810 0%, #0a2318 55%, #0d2e1f 100%);
    padding:56px 64px;
  }
  .eyebrow {
    color:#6ee7b7; font-size:19px; font-weight:700; letter-spacing:2px;
  }
  .headline {
    margin-top:14px;
    color:#f1f5f9; font-size:34px; font-weight:800; line-height:1.35;
  }
  .headline b { color:#34d399; }
  .grid {
    margin-top:40px;
    display:flex; gap:22px;
  }
  .card {
    flex:1;
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(52,211,153,0.25);
    border-radius:14px;
    padding:26px 22px;
  }
  .card .mark {
    width:34px; height:34px; border-radius:8px;
    background:rgba(52,211,153,0.18);
    border:1px solid rgba(52,211,153,0.5);
    margin-bottom:16px;
    position:relative;
  }
  .card .mark::after {
    content:""; position:absolute; inset:9px;
    background:#34d399; border-radius:2px;
  }
  .card h3 { color:#f0f4f8; font-size:20px; font-weight:700; margin-bottom:8px; }
  .card .num { color:#34d399; font-size:24px; font-weight:800; margin-bottom:6px; }
  .card p { color:#8ac0a3; font-size:15px; line-height:1.55; }
  .footer {
    margin-top:36px;
    color:#467a5f; font-size:16px; font-weight:600; letter-spacing:1px;
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="eyebrow">KAKAO GAMES NEW TITLES</div>
    <div class="headline">하반기 신작 3종, <b>핵심 정보</b> 한눈에 보기</div>
    <div class="grid">
      <div class="card">
        <div class="mark"></div>
        <div class="num">오딘Q</div>
        <h3>라이온하트스튜디오</h3>
        <p>북유럽 신화 '에다' 재해석<br>협동 전투 MMORPG</p>
      </div>
      <div class="card">
        <div class="mark"></div>
        <div class="num">도깨비의 세계</div>
        <h3>슈퍼캣</h3>
        <p>한국 전통 소재 K-판타지<br>문파 중심 협력 MMORPG</p>
      </div>
      <div class="card">
        <div class="mark"></div>
        <div class="num">갓 세이브 버밍엄</div>
        <h3>오션드라이브 스튜디오</h3>
        <p>중세 배경 좀비 서바이벌<br>물리엔진 기반 생존 액션</p>
      </div>
    </div>
    <div class="footer">티오의 게임노트</div>
  </div>
</body>
</html>
