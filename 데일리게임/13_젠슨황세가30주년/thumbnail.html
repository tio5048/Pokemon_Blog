<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1200px; height:630px; overflow:hidden; font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif; }
  .stage {
    position:relative;
    width:1200px; height:630px;
    background:
      radial-gradient(circle at 85% 15%, rgba(118,185,0,0.28) 0%, rgba(118,185,0,0) 45%),
      linear-gradient(135deg, #060a05 0%, #0d1a0a 45%, #12240f 100%);
    overflow:hidden;
  }
  .emblem {
    position:absolute; right:-100px; top:-100px;
    width:520px; height:520px; border-radius:50%;
    border:2px solid rgba(118,185,0,0.20);
  }
  .emblem::before {
    content:""; position:absolute; inset:60px; border-radius:50%;
    border:2px solid rgba(118,185,0,0.16);
  }
  .emblem::after {
    content:""; position:absolute; inset:120px; border-radius:50%;
    border:2px solid rgba(118,185,0,0.12);
  }
  .content {
    position:relative; z-index:2;
    padding:76px 90px;
    display:flex; flex-direction:column; justify-content:center;
    height:100%;
  }
  .tag {
    display:inline-block; align-self:flex-start;
    padding:8px 22px; margin-bottom:26px;
    background:rgba(118,185,0,0.15);
    border:1px solid rgba(118,185,0,0.55);
    border-radius:999px;
    color:#a3e635; font-size:22px; font-weight:700; letter-spacing:2px;
  }
  .title-en {
    font-size:42px; font-weight:800; color:#f1f5f9; letter-spacing:0.5px;
    line-height:1.2;
  }
  .title-en .hl { color:#76b900; }
  .title-kr {
    margin-top:22px;
    font-size:34px; font-weight:700; color:#e2e8f0;
    line-height:1.45;
  }
  .title-kr b { color:#76b900; }
  .sub {
    margin-top:28px;
    font-size:23px; color:#8a9a7f; font-weight:500;
  }
  .brand {
    position:absolute; left:90px; bottom:44px;
    font-size:22px; font-weight:700; color:#4a5a42; letter-spacing:1px;
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="emblem"></div>
    <div class="content">
      <span class="tag">NVIDIA × SEGA 30주년</span>
      <div class="title-en">NV1 <span class="hl">TO</span> RTX SPARK</div>
      <div class="title-kr">젠슨 황 "<b>일본 게임산업 없었다면</b><br>엔비디아도 AI도 없었다"</div>
      <div class="sub">세가와의 30년 인연 · 도쿄 아키하바라</div>
    </div>
    <div class="brand">티오의 게임노트</div>
  </div>
</body>
</html>
